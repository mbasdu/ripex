name: Build RU Net Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional version tag to publish/update a GitHub Release"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ru-net-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare release bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ github.event.inputs.release_tag }}"
          if [[ -z "$release_tag" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          fi

          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          version="${release_tag:-main-${stamp}}"
          bundle_dir="dist/ip-lists-ru-net-${version}"
          archive="ip-lists-ru-net-${version}.zip"

          test -f lists/merged/ru_all_v4.prefixes.txt
          test -f lists/merged/manifest.json

          mkdir -p "$bundle_dir"
          cp lists/merged/ru_all_v4.prefixes.txt "$bundle_dir/"
          cp lists/merged/manifest.json "$bundle_dir/"

          (
            cd "$bundle_dir"
            sha256sum ru_all_v4.prefixes.txt manifest.json > SHA256SUMS
          )

          (
            cd dist
            zip -r "$archive" "$(basename "$bundle_dir")"
          )

          echo "archive_path=dist/${archive}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${archive}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release asset
        if: ${{ steps.bundle.outputs.release_tag != '' }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.bundle.outputs.release_tag }}"
          asset="${{ steps.bundle.outputs.archive_path }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" --generate-notes --title "$tag"
          fi
